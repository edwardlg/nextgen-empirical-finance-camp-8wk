<!--
  video-embed.html — per-subchapter YouTube embed for the ASSIP textbook.

  Injected into every page (format.html.include-in-header). On a chapter/lab/
  mentor/reading page it derives the item id from the URL (ch11, lab1, mentor3,
  rgpack5, ...), looks it up in video-map.json (built by tools/build_video_map.py
  after manual upload to @LeiGao-gmu), and inserts a "Watch this lesson" player
  with one button per ≤5-min part. No map entry yet -> the script no-ops, so the
  page is never broken while videos are still being uploaded.
-->
<style>
  .assip-video { margin: 0.5rem 0 1.5rem 0; padding: 0.85rem 1rem;
    border: 1px solid var(--bs-border-color, #dee2e6); border-left: 4px solid #005239;
    border-radius: 4px; background: var(--bs-tertiary-bg, #f8f9fa); }
  .assip-video-label { font-weight: 600; color: #005239; margin-bottom: 0.6rem; }
  .assip-video-frame { position: relative; width: 100%; aspect-ratio: 16/9;
    border-radius: 4px; overflow: hidden; background: #000; }
  .assip-video-frame iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  .assip-video-parts { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.6rem; }
  .assip-video-parts button { padding: 0.3rem 0.7rem; border: 1px solid #005239;
    border-radius: 3px; background: #fff; color: #005239; font-size: 0.85rem; cursor: pointer; }
  .assip-video-parts button.active { background: #005239; color: #FFC733; }
</style>

<script>
(function () {
  // Derive the item id (ch11 / lab1 / mentor3 / rgpack5) from the page filename.
  function itemId() {
    var base = (location.pathname.split("/").pop() || "");
    var m = base.match(/^(ch\d{2}|lab\d|mentor\d|rgpack\d)/);
    return m ? m[1] : null;
  }

  // Fetch video-map.json, trying successive parent dirs so it works at any depth
  // and under any Pages base path. Resolves to the parsed object or {}.
  function loadMap() {
    var attempts = [];
    var prefix = "";
    for (var i = 0; i < 7; i++) { attempts.push(prefix + "video-map.json"); prefix += "../"; }
    return (function next(i) {
      if (i >= attempts.length) return Promise.resolve({});
      return fetch(attempts[i]).then(function (r) {
        return r.ok ? r.json() : next(i + 1);
      }).catch(function () { return next(i + 1); });
    })(0);
  }

  function render(clips) {
    var main = document.querySelector("main#quarto-document-content")
            || document.querySelector("main") || document.body;
    if (!main || main.querySelector(".assip-video")) return;

    var box = document.createElement("div");
    box.className = "assip-video";
    var label = clips.length > 1
      ? "Watch this lesson — " + clips.length + " short parts"
      : "Watch this lesson";
    box.innerHTML =
      '<div class="assip-video-label">' + label + '</div>' +
      '<div class="assip-video-frame"><iframe all=' +
      '"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"' +
      ' allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe></div>' +
      '<div class="assip-video-parts"></div>';

    var iframe = box.querySelector("iframe");
    var parts = box.querySelector(".assip-video-parts");
    function show(i) {
      iframe.src = "https://www.youtube-nocookie.com/embed/" + clips[i].youtube_id + "?rel=0";
      parts.querySelectorAll("button").forEach(function (b, j) {
        b.classList.toggle("active", j === i);
      });
    }
    clips.forEach(function (c, i) {
      var b = document.createElement("button");
      b.textContent = clips.length > 1 ? ("Part " + c.part) : "Play";
      b.title = c.title || "";
      b.addEventListener("click", function () { show(i); });
      parts.appendChild(b);
    });

    var h1 = main.querySelector("h1, header > h1, .quarto-title h1");
    var anchor = h1 ? (h1.closest("header.quarto-title-block, .quarto-title") || h1) : null;
    if (anchor && anchor.parentNode) anchor.parentNode.insertBefore(box, anchor.nextSibling);
    else main.insertBefore(box, main.firstChild);
    show(0);
  }

  function init() {
    var id = itemId();
    if (!id) return;
    loadMap().then(function (map) {
      var clips = map && map[id];
      if (clips && clips.length) render(clips);
    });
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
})();
</script>
