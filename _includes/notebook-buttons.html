<!--
  Notebook launcher buttons.
  Injected into <head> of every page by _quarto.yml's
  `format.html.include-in-header`. The script self-detects whether the
  current page was rendered from an .ipynb source (via the
  meta "quarto:source-file" tag that Quarto writes when `notebook-links`
  is enabled, or via the URL ending in a path Quarto recognizes as a
  notebook). If the source is a notebook, three buttons are inserted
  immediately under the page's H1: Download .ipynb, Open in Colab,
  Open in Binder.

  Repo coordinates — keep in sync with _quarto.yml.
-->
<style>
  .nb-launch {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin: 0.5rem 0 1.5rem 0;
    padding: 0.75rem 1rem;
    border: 1px solid var(--bs-border-color, #dee2e6);
    border-left: 4px solid #2c3e50;
    border-radius: 4px;
    background: var(--bs-tertiary-bg, #f8f9fa);
    font-size: 0.95rem;
    align-items: center;
  }
  .nb-launch-label {
    font-weight: 600;
    margin-right: 0.5rem;
    color: var(--bs-emphasis-color, #2c3e50);
  }
  .nb-launch a.nb-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.3rem 0.7rem;
    border: 1px solid var(--bs-border-color, #ced4da);
    border-radius: 3px;
    text-decoration: none;
    font-size: 0.875rem;
    background: var(--bs-body-bg, #ffffff);
    color: var(--bs-body-color, #212529);
    transition: background 0.15s, border-color 0.15s;
  }
  .nb-launch a.nb-btn:hover {
    background: var(--bs-secondary-bg, #e9ecef);
    border-color: #2c3e50;
    text-decoration: none;
  }
  .nb-launch a.nb-btn img {
    height: 1em;
    vertical-align: middle;
  }
</style>

<script>
(function () {
  // Keep these in sync with _quarto.yml `book.repo-url`.
  const GH_OWNER  = "edwardlg";
  const GH_REPO   = "nextgen-empirical-finance-camp-8wk";
  const GH_BRANCH = "main";

  function nbRelativePathFromSourceMeta() {
    // Quarto stamps the original source file into the page either as a
    // <meta name="quarto:source-file" ...> tag or in the page's
    // `data-source-file` body attribute, depending on version. Try both.
    const m = document.querySelector('meta[name="quarto:source-file"]');
    if (m && m.content) return m.content;

    const b = document.body && document.body.getAttribute("data-source-file");
    if (b) return b;

    // Fallback: infer from the URL. Pages rendered from notebooks
    // typically live under /notebooks/week-XX/nbX.Y-....html.
    const path = window.location.pathname;
    const match = path.match(/(notebooks\/week-\d+\/nb[^\/]+)\.html$/);
    if (match) return match[1] + ".ipynb";
    return null;
  }

  function isNotebookPath(p) {
    return p && /\.ipynb$/i.test(p);
  }

  function buildButtons(relPath) {
    const colabURL  = `https://colab.research.google.com/github/${GH_OWNER}/${GH_REPO}/blob/${GH_BRANCH}/${relPath}`;
    const binderURL = `https://mybinder.org/v2/gh/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}?filepath=${encodeURIComponent(relPath)}`;
    const rawURL    = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${relPath}`;
    const ghViewURL = `https://github.com/${GH_OWNER}/${GH_REPO}/blob/${GH_BRANCH}/${relPath}`;

    const bar = document.createElement("div");
    bar.className = "nb-launch";
    bar.setAttribute("role", "navigation");
    bar.setAttribute("aria-label", "Notebook launcher");
    bar.innerHTML = `
      <span class="nb-launch-label">Run this notebook:</span>
      <a class="nb-btn" href="${colabURL}" target="_blank" rel="noopener" title="Open in Google Colab">
        <img alt="" src="https://colab.research.google.com/assets/colab-badge.svg" />
        Open in Colab
      </a>
      <a class="nb-btn" href="${binderURL}" target="_blank" rel="noopener" title="Open in Binder">
        <img alt="" src="https://mybinder.org/badge_logo.svg" />
        Open in Binder
      </a>
      <a class="nb-btn" href="${rawURL}" download title="Download the .ipynb file">
        &#x2B07; Download .ipynb
      </a>
      <a class="nb-btn" href="${ghViewURL}" target="_blank" rel="noopener" title="View source on GitHub">
        &#xf09b; View on GitHub
      </a>
    `;
    return bar;
  }

  function inject() {
    const relPath = nbRelativePathFromSourceMeta();
    if (!isNotebookPath(relPath)) return;

    // Find the page's H1. Quarto wraps content in <main id="quarto-document-content">.
    const main = document.querySelector("main#quarto-document-content")
              || document.querySelector("main")
              || document.body;
    if (!main) return;

    // Don't double-inject.
    if (main.querySelector(".nb-launch")) return;

    const h1 = main.querySelector("h1, header > h1, .quarto-title h1");
    const bar = buildButtons(relPath);

    if (h1 && h1.parentNode) {
      // Insert after the H1's containing block (the title block).
      const block = h1.closest("header.quarto-title-block, .quarto-title") || h1;
      block.parentNode.insertBefore(bar, block.nextSibling);
    } else {
      main.insertBefore(bar, main.firstChild);
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", inject);
  } else {
    inject();
  }
})();
</script>
