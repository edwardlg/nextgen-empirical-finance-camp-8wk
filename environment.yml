# Conda environment for the NextGen Empirical Finance Research Camp.
# Create with:  conda env create -f environment.yml   then:  conda activate finlab
# Pinned per CONVENTIONS.md §5. See book/appendices/B-python-latex-setup/B1-toolchain.md.
name: finlab
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pandas>=2.2
  - numpy
  - scipy
  - statsmodels
  - matplotlib
  - scikit-learn
  - pyarrow
  - requests
  - jupyterlab
  - nbformat
  # --- Teaching-video pipeline (decks -> narrated MP4 on Hopper A100) ---
  - ffmpeg            # assembly, loudnorm, H.264 encode
  - poppler           # pdftoppm: pptx-PDF -> per-slide PNG
  # LibreOffice converts pptx -> pdf headless; on Hopper prefer `module load libreoffice`.
  # Quarto renders qmd -> pptx; install separately (`module load quarto` or quarto.org).
  - pip
  - pip:
      - linearmodels
      - pyfixest
      - differences
      - rdrobust
      - pysyncon
      - wrds
      - yfinance
      - pandas-datareader
      - fredapi
      # AI module (Week 6) — keys via env vars only (ANTHROPIC_API_KEY, AZURE_OPENAI_KEY); never commit keys.
      - anthropic
      - openai
      # --- Teaching-video pipeline (slides, narration, captions) ---
      - python-pptx
      - pdf2image
      - pillow
      - chatterbox-tts     # MIT TTS (code + weights), voice cloning from a short sample
      - whisperx           # forced-aligned caption sidecars (.vtt)
      - faster-whisper
      - soundfile
      # torch/torchaudio: install the CUDA build matching Hopper's driver, e.g.
      #   pip install torch torchaudio --index-url https://download.pytorch.org/whl/cu121
