# =====================================================================
# Build the Quarto book and publish to the gh-pages branch.
#
# After this workflow first succeeds, enable GitHub Pages in
# Settings -> Pages, with:
#   Source:  Deploy from a branch
#   Branch:  gh-pages   /  (root)
# The site will then be served at:
#   https://<owner>.github.io/<repo>/
#
# Build artifact published to gh-pages:
#   _site/   -> 8-week HTML book (KaTeX math, search, dark/light)
#
# The PDF and per-week .pptx decks are NOT built here: a separate
# `quarto render --to pdf` cleans _site and wipes the HTML book, and
# neither artifact is linked on the site. Build them locally / on Hopper
# (see book/decks/Makefile and slurm/) when you actually need them.
#
# Trigger: push to main, or manual dispatch from the Actions tab.
# =====================================================================
name: Render and publish Quarto book

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment, cancel in-progress runs.
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: write   # needed for quarto-actions/publish to push to gh-pages

jobs:
  build-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history; quarto-actions/publish needs it for gh-pages

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          # tinytex: true installs Quarto's bundled TinyTeX so PDF rendering works.
          tinytex: true
          # Pin a recent Quarto. Bump when needed.
          version: "1.5.57"

      - name: Quarto check (diagnostic)
        run: quarto check

      # Notebooks are NOT executed on CI (no data, no API keys).
      # _quarto.yml sets `execute.enabled: false` globally; the renders
      # below produce static notebook pages from the .ipynb sources.

      # ---- 8-week edition: HTML site (the deployed deliverable) ----
      # IMPORTANT: render HTML only. A separate `quarto render --to pdf`
      # cleans the _site output dir and wipes the HTML book before deploy.
      # The PDF and the per-week .pptx decks are supplementary artifacts,
      # not linked on the site (downloads: []); generate them locally / on
      # Hopper (see slurm/ and book/decks/Makefile) when needed.
      - name: Render 8-week book -> _site/ (HTML)
        run: quarto render --to html

      - name: List built site (diagnostic)
        run: |
          echo "::group::Top-level _site/"
          ls -la _site/ || true
          echo "::endgroup::"
          echo "index.html present:"
          test -f _site/index.html && echo "  yes" || { echo "  NO — aborting deploy"; exit 1; }

      - name: Deploy _site/ to gh-pages
        # peaceiris auto-creates the gh-pages branch with force_orphan; this
        # works on a fresh repo, unlike quarto-actions/publish@v2 which
        # requires gh-pages to pre-exist (the prior failure mode).
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "Deploy ${{ github.sha }}"
