# =====================================================================
# Shared deck settings for ALL per-subchapter chapter decks.
# Slides are LaTeX/beamer (great math, tables, full control), GMU-themed.
# One segment deck (chXY-pN.qmd) = one <=5-minute teaching video.
# The [MEF Wx.y Pn] YouTube title-code lives in the render MANIFEST
# (clips.jsonl), NOT on the slide, so slide titles stay clean.
# =====================================================================
author: "Prof. Lei Gao · George Mason University"
subtitle: "NextGen 8-Week Empirical Finance Camp"

format:
  beamer:
    aspectratio: 169        # 16:9 -> native 1920x1080 video
    fontsize: 10pt
    navigation: empty
    slide-level: 2          # one `##` = one frame (slide)
    classoption: ["t"]      # top-align frame content (not vertically centered)
    header-includes: |
      \definecolor{masongreen}{HTML}{005239}
      \definecolor{masongold}{HTML}{FFC733}
      \setbeamercolor{frametitle}{bg=masongreen,fg=white}
      \setbeamercolor{title}{fg=masongreen}
      \setbeamercolor{author}{fg=masongreen}
      \setbeamercolor{structure}{fg=masongreen}
      \setbeamercolor{block title}{bg=masongold,fg=masongreen}
      \setbeamercolor{itemize item}{fg=masongreen}
      \setbeamerfont{frametitle}{series=\bfseries}
      \setbeamertemplate{itemize item}{\textbullet}
      \usepackage{booktabs}

execute:
  echo: true
  warning: false
  message: false
  freeze: auto
