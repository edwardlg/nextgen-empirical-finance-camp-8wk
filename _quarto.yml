# =====================================================================
# NextGen Empirical Finance Research Camp — Quarto book configuration
# Host: Prof. Lei Gao, George Mason University, Costello College of Business
# Render locally:   quarto preview        (live reload)
# Render once:      quarto render
# Deploy:           push to main; GitHub Actions publishes to gh-pages.
# =====================================================================

project:
  type: book
  output-dir: _site
  preview:
    port: 4200
    browser: false
  resources:
    - "notebooks/**/*.ipynb"
    - "data-cards/**/*.md"
    - "environment.yml"
    - "CONVENTIONS.md"

# -----------------------------------------------------------------
# Global execution policy: never execute code on CI or locally during
# render. Notebooks ship as static renderings; students download/run
# them in Colab / Binder / locally. Freeze prerendered outputs.
# -----------------------------------------------------------------
execute:
  enabled: false
  freeze: true

# Bibliography: no central .bib yet. Uncomment when refs/refs.bib lands.
# bibliography: refs/refs.bib
# csl: chicago-author-date.csl

book:
  title: "NextGen Empirical Finance Research Camp"
  subtitle: "8-Week Edition — An Intensive Camp in Empirical Finance for High-School Researchers"
  output-file: "empirical-finance-camp-8wk.pdf"
  author:
    - name: "Lei Gao"
      affiliation: "Costello College of Business, George Mason University"
      url: "https://business.gmu.edu/"
  date: "2026-05-30"
  date-format: "iso"
  reader-mode: true
  search:
    location: navbar
    type: overlay
  page-navigation: true
  back-to-top-navigation: true
  repo-url: "https://github.com/edwardlg/nextgen-empirical-finance-camp-8wk"
  repo-branch: main
  repo-actions: [edit, issue, source]
  downloads: []
  sharing: [twitter, linkedin]
  twitter-card:
    creator: "@gmu_business"
    card-style: summary_large_image
    title: "NextGen Empirical Finance Research Camp"
    description: "An intensive 8-week empirical-finance research camp for advanced high-school students."
  open-graph:
    locale: en_US
    site-name: "NextGen Empirical Finance Research Camp"
    title: "NextGen Empirical Finance Research Camp"
    description: "An intensive 8-week empirical-finance research camp for advanced high-school students."
