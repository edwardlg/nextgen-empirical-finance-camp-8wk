# -----------------------------------------------------------------
# HTML format. KaTeX for fast math. Cosmo (light) + Darkly (dark) with
# a custom SCSS layer to push the look toward an academic textbook.
# -----------------------------------------------------------------
format:
  html:
    theme:
      light: [cosmo, styles.scss]
      dark: [darkly, styles.scss]
    css: []
    fontsize: "1.0rem"
    linestretch: 1.6
    mainfont: "Source Serif Pro, 'Source Serif 4', Georgia, 'Times New Roman', serif"
    monofont: "JetBrains Mono, 'Fira Code', Menlo, Consolas, monospace"
    code-copy: hover
    code-fold: false
    code-tools: true
    code-link: true
    code-overflow: wrap
    code-line-numbers: false
    code-block-border-left: true
    highlight-style: github
    html-math-method: katex
    toc: true
    toc-depth: 3
    toc-location: right
    toc-expand: 2
    number-sections: false
    number-depth: 2
    smooth-scroll: true
    anchor-sections: true
    citations-hover: true
    crossrefs-hover: true
    fig-responsive: true
    fig-cap-location: bottom
    tbl-cap-location: top
    link-external-newwindow: true
    link-external-icon: true
    callout-appearance: simple
    callout-icon: true
    notebook-links: inline
    notebook-view: true
    include-in-header:
      - file: _includes/notebook-buttons.html
  pdf:
    documentclass: scrbook
    papersize: letter
    geometry: [margin=1in]
    fontsize: 11pt
    fig-pos: 'H'
    code-line-numbers: false
    code-overflow: wrap
    pdf-engine: xelatex
    keep-tex: false
    toc: true
    number-sections: true
    colorlinks: true
    cite-method: natbib

# -----------------------------------------------------------------
# Cross-reference labels (Quarto's section/figure/table refs).
# -----------------------------------------------------------------
crossref:
  chapters: true
  sec-prefix: "Section"
  fig-prefix: "Figure"
  tbl-prefix: "Table"
  eq-prefix: "Equation"
  thm-prefix: "Theorem"
  def-prefix: "Definition"

# -----------------------------------------------------------------
# Filters (none enabled yet). Notebook buttons are injected via
# include-in-header above; a Lua filter could replace it later.
# -----------------------------------------------------------------
filters: []

# -----------------------------------------------------------------
# Editor metadata (used by `quarto edit`).
# -----------------------------------------------------------------
editor:
  render-on-save: false
